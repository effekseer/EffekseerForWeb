name: Distribution Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  native-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: Build native WebGL/WebGPU outputs
        id: build_native
        shell: bash
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          python build.py

      - name: Upload native browser outputs
        uses: actions/upload-artifact@v4
        with:
          name: browser-native-dist
          path: |
            dist/effekseer-webgl-native.js
            dist/effekseer-webgl-native.wasm
            dist/effekseer-webgpu-native.js
            dist/effekseer-webgpu-native.wasm
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs: native-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=EffekseerForWeb${version}" >> "$GITHUB_OUTPUT"

      - name: Download native browser outputs
        id: native_dist
        uses: actions/download-artifact@v4
        with:
          name: browser-native-dist
          path: dist

      - name: TypeScript and API tests
        run: npm test

      - name: Prepare browser test reports
        shell: bash
        run: mkdir -p test-results

      - name: Browser smoke tests
        env:
          EFK_ALLOW_WEBGPU_SKIP: "1"
          EFK_ALLOW_WEBGPU_READBACK_SKIP: "1"
        run: npm run test:browser:ci -- --report test-results/browser-smoke-ubuntu.json

      - name: Upload browser smoke report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-ubuntu
          path: test-results/browser-smoke-ubuntu.json
          if-no-files-found: warn

      - name: Capture browser test screenshots
        if: ${{ !cancelled() && steps.native_dist.outcome == 'success' }}
        run: npm run test:screenshots:ci

      - name: Upload browser test screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-screenshots
          path: test-results/testdata-screenshots
          if-no-files-found: warn

      - name: Create distribution archives
        run: npm run package:distribution

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: .tmp/distribution/${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated EffekseerForWeb distribution package."
          fi

  webgpu-macos:
    name: WebGPU browser smoke and screenshots (macOS)
    runs-on: macos-latest
    needs: native-build
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Download native browser outputs
        uses: actions/download-artifact@v4
        with:
          name: browser-native-dist
          path: dist

      - name: Prepare browser test reports
        run: |
          node -e "require('fs').mkdirSync('test-results', { recursive: true })"

      - name: Browser smoke tests
        id: browser_smoke
        continue-on-error: true
        env:
          EFK_ALLOW_WEBGPU_SKIP: "1"
          EFK_ALLOW_WEBGPU_READBACK_SKIP: "1"
        run: npm run test:browser:ci -- --report test-results/browser-smoke-macos-latest.json

      - name: Write missing WebGPU probe report
        if: ${{ !cancelled() }}
        run: |
          node -e "const fs = require('fs'); const path = 'test-results/browser-smoke-macos-latest.json'; if (!fs.existsSync(path)) { fs.mkdirSync('test-results', { recursive: true }); fs.writeFileSync(path, JSON.stringify({ ok: false, fatal: true, probe: true, os: 'macos-latest', smokeStepOutcome: '${{ steps.browser_smoke.outcome }}', message: 'Browser smoke step ended before writing a report.', webgpuSummary: { total: 0, executed: 0, skippedUnavailable: 0, unavailable: 0, canvasUnavailable: 0, executedFailed: 0, readbackUnavailable: 0, unknown: 0, cases: [] }, results: [] }, null, 2) + '\n'); }"

      - name: Upload WebGPU probe report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-webgpu-smoke-macos
          path: test-results/browser-smoke-macos-latest.json
          if-no-files-found: warn

      - name: Capture WebGPU screenshots
        id: webgpu_screenshots
        continue-on-error: true
        run: npm run test:screenshots:webgpu:ci

      - name: Upload WebGPU screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-webgpu-screenshots-macos
          path: test-results/testdata-screenshots/webgpu-ci
          if-no-files-found: warn
