name: Distribution Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: TypeScript and API tests
        run: npm test

      - name: Build native WebGL/WebGPU outputs
        shell: bash
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          python build.py

      - name: Create distribution archives
        run: npm run package:distribution

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EffekseerForWeb-distribution
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated EffekseerForWeb distribution package."
          fi
